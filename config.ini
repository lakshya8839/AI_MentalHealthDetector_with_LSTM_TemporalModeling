# Configuration file for AI Mental Health Detector
# Modify these parameters to customize the system

[Model]
# HuggingFace model for emotion detection
emotion_model = j-hartmann/emotion-english-distilroberta-base

# LSTM temporal model parameters
sequence_length = 5
feature_dimension = 20
lstm_units_1 = 64
lstm_units_2 = 32
dense_units = 32
dropout_rate = 0.2

[Training]
# LSTM training parameters
n_synthetic_sequences = 1000
decline_ratio = 0.35
epochs = 50
batch_size = 32
validation_split = 0.2
learning_rate = 0.001

[Scoring]
# Risk thresholds
low_risk_threshold = 0.3
high_risk_threshold = 0.6

# Mental health score weights
emotion_weight = 0.25
negative_words_weight = 0.25
sentiment_weight = 0.20
intensity_weight = 0.15
first_person_weight = 0.15

[Application]
# Streamlit app settings
app_title = AI Silent Mental Health Detector
page_icon = 🧠
layout = wide

# Session settings
min_entries_for_lstm = 5
max_history_length = 100

[Privacy]
# Data handling (for production)
store_user_data = false
anonymize_data = true
data_retention_days = 30
encrypt_storage = true

[Alerts]
# Alert thresholds
consecutive_high_risk_alerts = 3
alert_email_enabled = false
alert_email_address = alerts@example.com

[Resources]
# Crisis support information
crisis_hotline_us = 988
crisis_text_line = HOME to 741741
crisis_website = https://988lifeline.org
